<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="60%" fx="50%" fy="45%">
      <stop offset="0%" stop-color="hsl(217, 91%, 60%)" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="hsl(224, 64%, 33%)" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="hsl(0, 0%, 9%)" stop-opacity="0"/>
    </radialGradient>
    <!-- Orb gradient -->
    <radialGradient id="orb-gradient" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="hsl(213, 94%, 68%)"/>
      <stop offset="50%" stop-color="hsl(217, 91%, 60%)"/>
      <stop offset="100%" stop-color="hsl(225, 71%, 40%)"/>
    </radialGradient>
    <!-- Orb glow -->
    <filter id="orb-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle grid pattern -->
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="none"/>
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="hsl(217, 91%, 60%)" stroke-width="0.3" stroke-opacity="0.08"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="hsl(0, 0%, 9%)"/>

  <!-- Grid pattern overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Background glow -->
  <rect width="1200" height="630" fill="url(#bg-glow)"/>

  <!-- Decorative line - top -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="hsl(217, 91%, 60%)" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Decorative line - bottom -->
  <line x1="0" y1="629" x2="1200" y2="629" stroke="hsl(217, 91%, 60%)" stroke-width="2" stroke-opacity="0.3"/>

  <!-- Orb symbol -->
  <circle cx="600" cy="235" r="52" fill="url(#orb-gradient)" filter="url(#orb-glow)" opacity="0.9"/>
  <circle cx="600" cy="235" r="52" fill="none" stroke="hsl(213, 94%, 68%)" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="600" cy="235" r="32" fill="none" stroke="hsl(0, 0%, 100%)" stroke-width="1" stroke-opacity="0.2"/>
  <!-- Center dot -->
  <circle cx="600" cy="235" r="6" fill="hsl(0, 0%, 100%)" opacity="0.8"/>

  <!-- Brand name: Orb RH -->
  <text x="600" y="350" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="64" font-weight="700" fill="hsl(0, 0%, 100%)" letter-spacing="-1">
    Orb RH
  </text>

  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="400" fill="hsl(0, 0%, 64%)" letter-spacing="0.5">
    Sistema de Gestao de RH
  </text>

  <!-- Subtle divider line -->
  <line x1="520" y1="430" x2="680" y2="430" stroke="hsl(217, 91%, 60%)" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Powered by -->
  <text x="600" y="470" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="hsl(0, 0%, 45%)" letter-spacing="2">
    POWERED BY POPCODE
  </text>
</svg>
